---
# On-device e2e: start the Arizona server, then run the Compose UI tests on an
# Android emulator that drives the /native examples over a real WebSocket. The
# app connects to localhost:4040, tunnelled to the host server via `adb reverse`.
#
# The Android client lives in-repo at clients/android, so the server and client
# are checked out together. Adjust OTP/Node versions and API level for your setup.
name: android-e2e

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  emulator-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Single source of truth: Java + Gradle come straight from .tool-versions
      # (mise's native format, including the exact Gradle release), the same file
      # setup-beam/setup-node read for OTP/Node. Scoped to java+gradle so erlang
      # stays on setup-beam's fast precompiled OTP (mise builds it from source).
      # mise puts both on PATH (shims) for the build/test steps below.
      - name: Set up Java + Gradle from .tool-versions
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: java gradle
          cache: true

      # mise caches the Gradle/JDK binaries; this caches the downloaded
      # dependencies (~/.gradle/caches), keyed on the build + version-catalog
      # files so it invalidates when they change.
      - name: Cache Gradle dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.gradle/caches
          key: >-
            gradle-${{ runner.os }}-${{ hashFiles(
              'clients/android/**/*.gradle.kts',
              'clients/android/gradle/libs.versions.toml',
              'clients/android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Start Arizona server (port 4040; the emulator reaches it via adb reverse)
        run: |
          export PORT=4040 ERLANG_EXTRA_ARGS=-noshell
          ./scripts/start_test_server.sh > /tmp/arizona-server.log 2>&1 &
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:4040/ > /dev/null; then echo "server up"; exit 0; fi
            sleep 1
          done
          echo "server failed to start"; cat /tmp/arizona-server.log; exit 1

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator e2e
        # v2.37.0
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 35
          arch: x86_64
          working-directory: clients/android
          # The :sample build's adbReverse task tunnels the emulator's
          # localhost:4040 to the host server before connectedCheck runs the
          # Compose UI tests (the app connects to http://localhost:4040).
          script: gradle :sample:connectedCheck
