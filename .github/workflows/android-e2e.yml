---
# On-device e2e: start the Arizona server, then run the Compose UI test on an
# Android emulator that drives /native/counter over a real WebSocket.
#
# The Android client lives in-repo at clients/android, so the server and client
# are checked out together. Adjust OTP/Node versions and API level for your setup.
name: android-e2e

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  emulator-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Start Arizona server (port 4040, reachable from emulator at 10.0.2.2)
        run: |
          export PORT=4040 ERLANG_EXTRA_ARGS=-noshell
          ./scripts/start_test_server.sh > /tmp/arizona-server.log 2>&1 &
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:4040/ > /dev/null; then echo "server up"; exit 0; fi
            sleep 1
          done
          echo "server failed to start"; cat /tmp/arizona-server.log; exit 1

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: '8.11.1'

      - name: Run emulator e2e
        # v2.37.0
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 34
          arch: x86_64
          working-directory: clients/android
          script: gradle :sample:connectedCheck
