---
# iOS client CI. Two jobs:
#   - logic: the AzWire protocol tests, run on Linux in the official Swift image
#     (no Mac needed) -- fast, free feedback for the bulk of the client.
#   - simulator-e2e: the SwiftUI render + XCUITest e2e, which need macOS. Starts
#     the Arizona server on :4040 and drives the /native examples on an iOS
#     Simulator. The Simulator shares the runner's localhost, so it reaches the
#     server directly -- no tunnel (unlike android-e2e's adb reverse).
#
# The server is the pure-Erlang `roadrunner` adapter, so it builds on macOS with
# OTP alone; the one thing to watch is setup-beam providing the .tool-versions
# OTP on macOS. Xcode is the runner's default; pin it via maxim-lobanov/setup-xcode
# if a specific version is needed.
name: ios-e2e

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      # Run swift test in the official Swift image -- the same way it is verified
      # locally on non-Mac machines. The SwiftUI renderer (AzClientUI) compiles to
      # an empty module here (canImport(SwiftUI) is false) and is exercised by the
      # simulator-e2e job below.
      - name: Run AzWire logic tests
        run: docker run --rm -v "$PWD/clients/ios":/pkg -w /pkg swift:6.1 swift test

  simulator-e2e:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .tool-versions
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install Node.js dependencies
        run: npm ci

      # Cache the compiled deps so the server step only recompiles arizona itself.
      - name: Cache rebar3 _build
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: _build
          key: ios-rebar3-${{ runner.os }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ios-rebar3-${{ runner.os }}-

      # The start script runs a cold `vite build` plus a `rebar3 compile` before
      # it binds the port, and a macOS runner is slow enough to sit past a
      # one-minute budget. Same 180s budget as android-e2e's identical step.
      - name: Start Arizona server (port 4040; the Simulator reaches it on localhost)
        run: |
          export PORT=4040 ERLANG_EXTRA_ARGS=-noshell
          ./scripts/start_test_server.sh > /tmp/arizona-server.log 2>&1 &
          for _ in $(seq 1 180); do
            if curl -sf http://localhost:4040/ > /dev/null; then echo "server up"; exit 0; fi
            sleep 1
          done
          echo "server failed to start"; cat /tmp/arizona-server.log; exit 1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the Xcode project
        run: cd clients/ios/Sample && xcodegen generate

      - name: Run the iOS Simulator e2e
        run: |
          # Resolve ONE concrete simulator and address it by UDID from here on: a
          # model name can match several installed runtimes, and the device we
          # boot has to be the device xcodebuild runs the tests on.
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '.devices | to_entries[]
                     | select(.key | contains("SimRuntime.iOS"))
                     | .value[] | select(.name | startswith("iPhone")) | .udid' \
            | head -1)
          if [ -z "$UDID" ]; then
            echo "no available iPhone simulator"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator $UDID"
          # `simctl boot` only kicks the boot off, so the old fire-and-forget
          # left the first test's app launch racing a half-booted device.
          # `bootstatus -b` boots if needed and blocks until the boot completes.
          xcrun simctl bootstatus "$UDID" -b
          cd clients/ios/Sample
          xcodebuild test \
            -scheme Sample \
            -destination "id=$UDID" \
            -resultBundlePath /tmp/ios-e2e.xcresult

      # A Simulator failure is undiagnosable once the runner is gone: the
      # xcresult carries the failing test's screenshots and the app's console
      # output, and the server log says whether the other end was healthy.
      - name: Upload the failure diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: ios-e2e-diagnostics
          path: |
            /tmp/ios-e2e.xcresult
            /tmp/arizona-server.log
          retention-days: 7
