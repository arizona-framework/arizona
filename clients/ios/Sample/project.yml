# XcodeGen spec for the sample app + UI-test bundle. Generate the Xcode project
# with `xcodegen generate` (run from this directory) -- the .xcodeproj is not
# committed (mirrors the Android client carrying declarative Gradle files, not an
# IDE project blob). The Makefile's build-ios/test-ios run it for you.
name: Sample
options:
  bundleIdPrefix: dev.arizona
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  # The local Swift package (clients/ios) providing AzWire + AzClientUI.
  Arizona:
    path: ..
targets:
  Sample:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.arizona.sample
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Arizona
        product: AzClientUI
  SampleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.arizona.sample.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        TEST_TARGET_NAME: Sample
    dependencies:
      - target: Sample
schemes:
  Sample:
    build:
      targets:
        Sample: all
        SampleUITests: [test]
    test:
      targets:
        - SampleUITests
